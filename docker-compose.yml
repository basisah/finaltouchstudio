services:
  # ──────────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fts_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: finaltouchstudio
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3307:3306"   # host:3307 → container:3306 (local MySQL owns 3306)
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Node.js Backend (Express + nodemon live reload)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fts_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000             # internal container port
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: finaltouchstudio
      DB_USER: appuser
      DB_PASSWORD: apppassword
    ports:
      - "4000:4000"          # host:4000 → container:4000
    volumes:
      - ./backend:/app          # live code sync
      - /app/node_modules       # prevent host node_modules from overriding
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  # ──────────────────────────────────────────────
  # React Frontend (Vite HMR live reload)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fts_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "8080:3000"          # host:8080 → container:3000
    volumes:
      - ./frontend:/app         # live code sync
      - /app/node_modules       # prevent host node_modules from overriding
    depends_on:
      - backend
    command: npm run dev

volumes:
  db_data:
